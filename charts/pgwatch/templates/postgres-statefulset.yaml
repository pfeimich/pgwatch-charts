{{/*
  Skipped when timescaledb.enabled: true — the TimescaleDB subchart provides the
  database in that case and db-init-job.yaml handles schema/user bootstrapping.
*/}}
{{- if and (include "pgwatch.isTrue" .Values.pgwatch.postgres.create_metric_database) (not .Values.timescaledb.enabled) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: "postgres-svc"
  replicas: 1
  selector:
    matchLabels:
      application: pgwatch
      pgwatch.pods.role: postgres
  template:
    metadata:
      labels:
        application: pgwatch
        pgwatch.pods.role: postgres
    spec:
      {{- include "pgwatch.podSecurityContext" (dict "global" .Values.securityContext "component" .Values.pgwatch.postgres.securityContext) | nindent 6 }}
      initContainers:
      - name: init-permissions
        env:
        - name: PGDATA
          value: /pgdata/data
        image: {{ .Values.pgwatch.postgres.new_pg_database.image }}
        command:
        - /bin/sh
        - -c
        - |
          if [ ! -d "$PGDATA" ]; then
            if [ "$(id -u)" = "0" ]; then
              mkdir -p "$PGDATA"
              chown postgres "$PGDATA"
              chmod 700 "$PGDATA"
            fi
          fi
        # Init container must run as root to perform chown; this overrides any pod/global
        # security context so the filesystem can be prepared for the postgres user.
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
        volumeMounts:
        - name: pgdata
          mountPath: /pgdata
      containers:
      - name: postgres
        {{- include "pgwatch.containerSecurityContext" (dict "global" .Values.securityContext "component" .Values.pgwatch.postgres.securityContext) | nindent 8 }}
        image: {{ .Values.pgwatch.postgres.new_pg_database.image }}
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pgwatch-postgresql-secret-postgres
              key: password
        - name: POSTGRES_USER
          value: postgres
        - name: PGDATA
          value: /pgdata/data
        {{- range $key, $value := .Values.pgwatch.postgres.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- with .Values.pgwatch.postgres.envFrom }}
        envFrom:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: pgdata
          mountPath: /pgdata
  volumeClaimTemplates:
  - metadata:
      name: pgdata
      labels:
        application: pgwatch
        pgwatch.pods.role: postgres
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: {{ .Values.pgwatch.postgres.new_pg_database.volume.storageClass }}
      resources:
        requests:
          storage: {{ .Values.pgwatch.postgres.new_pg_database.volume.size }}
{{ end }}
