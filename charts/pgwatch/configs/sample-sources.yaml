# Sample pgwatch sources file
# Defines which PostgreSQL databases pgwatch should monitor.
#
# Reference: https://pgwat.ch/v5.x/reference/cli_env.html#sources
# Upstream example: https://github.com/cybertec-postgresql/pgwatch/blob/master/contrib/sample.sources.yaml
#
# Usage in values.yaml:
#   pgwatch:
#     sources:
#       files:
#         my-databases.yaml: |
#           - name: "my-postgres"
#             connstr: "postgresql://pgwatch:pgwatchadmin@host:5432/mydb?sslmode=disable"
#             preset_metrics: "exhaustive"
#             is_enabled: true
#
# Or pass a file directly at install time:
#   helm install pgwatch . \
#     --set-file pgwatch.sources.files.sources\\.yaml=./my-sources.yaml

- name: "test-db"
  # -- PostgreSQL connection string for the monitored database.
  conn_str: postgresql://postgres@localhost/postgres

  kind: postgres              # One of the:
                              # - postgres
                              # - postgres-continuous-discovery
                              # - pgbouncer
                              # - pgpool
                              # - patroni
                              # Defaults to postgres if not specified

  # -- Named metric preset to use. Common presets: "exhaustive", "standard", "basic", "minimal".
  # check `presets` in https://github.com/cybertec-postgresql/pgwatch/blob/master/internal/metrics/metrics.yaml
  preset_metrics: "exhaustive_no_python" # That's the minimal preset_metrics to get the default home dashboard working

  custom_metrics:             # if both preset and custom are specified, custom wins
  preset_metrics_standby:     # optional metrics configuration for standby / replica state, v1.8.1+
  custom_metrics_standby:
  include_pattern:            # regex to filter databases to actually monitor for the "continuous" modes
  exclude_pattern:
  is_enabled: true
  group: default              # just for logical grouping of DB hosts or for "sharding", i.e. splitting the workload between many gatherer daemons
  custom_tags:                # option to add arbitrary tags for every stored data row,
      aws_instance_id: i-deadbeef       # for example to fetch data from some other source onto a same Grafana graph

