{{/*
==============================================================================
  db-init-job — post-install/post-upgrade Helm hook Job
==============================================================================
  Creates the pgwatch application user and the three required databases
  (pgwatch, pgwatch_metrics, pgwatch_grafana) against whichever backend is
  active.  This replaces the old lifecycle.postStart hook that was embedded
  in postgres-statefulset.yaml.

  Rendered when:
    - timescaledb.enabled: true   (TimescaleDB subchart is the backend)
    - OR create_metric_database: "true"  (built-in PostgreSQL StatefulSet)

  Admin credentials are sourced from:
    - TimescaleDB, generated secret  : Secret <release>-timescaledb           key postgres-password
    - TimescaleDB, existingSecret    : Secret timescaledb.auth.existingSecret  key postgres-password
    - Plain postgres                 : Secret pgwatch-postgresql-secret-postgres  key password

  The pgwatch user credentials are always read from:
    - Secret pgwatch-postgresql-secret-pgwatch  keys username / password
==============================================================================
*/}}
{{- if or .Values.timescaledb.enabled (include "pgwatch.isTrue" .Values.pgwatch.postgres.create_metric_database) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-db-init
  namespace: {{ .Release.Namespace }}
  labels:
    application: pgwatch
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        application: pgwatch
        pgwatch.pods.role: db-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: {{ .Values.pgwatch.postgres.new_pg_database.image }}
          env:
            - name: PGHOST
              value: {{ include "pgwatch.dbHost" . }}
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.timescaledb.enabled }}
                  name: {{ .Values.timescaledb.auth.existingSecret | default (printf "%s-timescaledb" .Release.Name) }}
                  key: postgres-password
                  {{- else }}
                  name: pgwatch-postgresql-secret-postgres
                  key: password
                  {{- end }}
            - name: PGWATCH_USER
              valueFrom:
                secretKeyRef:
                  name: pgwatch-postgresql-secret-pgwatch
                  key: username
            - name: PGWATCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgwatch-postgresql-secret-pgwatch
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "Waiting for database at $PGHOST:$PGPORT ..."
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER"; do
                sleep 3
              done
              echo "Database is ready."

              echo "Creating pgwatch role (idempotent) ..."
              psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -c \
                "DO \$\$ BEGIN \
                   IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '${PGWATCH_USER}') THEN \
                     EXECUTE format('CREATE ROLE %I LOGIN PASSWORD %L', '${PGWATCH_USER}', '${PGWATCH_PASSWORD}'); \
                     RAISE NOTICE 'Role % created.', '${PGWATCH_USER}'; \
                   ELSE \
                     RAISE NOTICE 'Role % already exists, skipping.', '${PGWATCH_USER}'; \
                   END IF; \
                 END \$\$;"

              echo "Creating databases (idempotent) ..."
              for DB in pgwatch pgwatch_metrics pgwatch_grafana; do
                psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" \
                  -tc "SELECT 1 FROM pg_database WHERE datname = '$DB'" \
                  | grep -q 1 \
                  || psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -c "CREATE DATABASE $DB"
                psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" \
                  -c "ALTER DATABASE $DB OWNER TO ${PGWATCH_USER};"
              done

              echo "Database initialisation complete."
{{- end }}
